name: build-fraud-release

on:
  push:
    branches: [ main ]
    paths:
      - 'containers/**'
      - 'pipelines/**'
      - 'scripts/**'
      - 'configs/**'
      - '.github/workflows/build-release.yml'

jobs:
  build-release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r containers/fraud-inference/requirements.txt
          pip install pyyaml pytest

      - name: Run tests
        run: |
          pytest containers/fraud-inference/tests -q

      - name: Build release manifest
        run: |
          python scripts/build_release_manifest.py \
            --model-package-arn arn:aws:sagemaker:us-east-1:123456789012:model-package/fraud-build-candidate \
            --business-version build-${{ github.sha }} \
            --config configs/stage/fraud-endpoint.yaml \
            --output release-manifest.json

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: fraud-release-manifest
          path: release-manifest.json
