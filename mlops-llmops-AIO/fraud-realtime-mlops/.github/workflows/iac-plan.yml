name: terraform-plan-fraud-serving

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'iac/terraform/**'

jobs:
  terraform-plan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt check
        run: terraform -chdir=iac/terraform fmt -check

      - name: Terraform init
        run: terraform -chdir=iac/terraform init -backend=false

      - name: Terraform validate
        run: terraform -chdir=iac/terraform validate
