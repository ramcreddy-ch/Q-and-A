name: contract-validation

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'contracts/**'
      - 'docs/data-contracts/**'
      - 'scripts/validate_contract_payload.py'
      - 'tests/contracts/**'
      - 'tests/fixtures/card_auth_event_*'

jobs:
  validate-contracts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Run contract tests
        run: pytest tests/contracts -q

      - name: Validate sample payload against contract
        run: |
          python scripts/validate_contract_payload.py \
            --schema contracts/events/card_auth_event/v2/schema.json \
            --payload tests/fixtures/card_auth_event_v2_valid.json
