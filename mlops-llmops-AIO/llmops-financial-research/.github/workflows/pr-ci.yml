name: llmops-pr-ci

on:
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest pyyaml ruff
      - name: Lint
        run: ruff check .
      - name: Tests
        run: pytest -q
      - name: Validate config
        run: python scripts/validate_config.py configs/stage/assistant.yaml
      - name: Local smoke
        run: bash scripts/local_smoke.sh
