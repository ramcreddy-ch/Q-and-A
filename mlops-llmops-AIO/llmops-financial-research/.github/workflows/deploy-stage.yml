name: deploy-llm-stage

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Business release version'
        required: true

jobs:
  deploy-stage:
    runs-on: ubuntu-latest
    environment: stage
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml
      - name: Validate stage config
        run: python scripts/validate_config.py configs/stage/assistant.yaml
      - name: Run evaluation gate
        run: python eval/run_eval.py --dataset eval/datasets/financial_qa_eval.jsonl --prompt prompts/regulated_qa/v1/system_prompt.txt
      - name: Deploy stage plan
        run: python pipelines/deployment/deploy.py --env stage --config configs/stage/assistant.yaml --version "${{ inputs.version }}"
